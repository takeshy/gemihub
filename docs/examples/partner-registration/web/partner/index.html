<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <div class="bg-white rounded-lg shadow-md p-8">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Partner ダッシュボード</h1>
      <div id="user" class="text-gray-700">読み込み中...</div>
      <button id="logout" class="mt-6 text-sm text-blue-600 underline">ログアウト</button>
    </div>
  </div>

  <script src="/__gemihub/api.js"></script>
  <script>
    (async () => {
      const user = await gemihub.auth.require("partner", "/login/partner");
      const profile = user.profile || {};
      document.getElementById("user").innerHTML = `
        <p><strong>氏名:</strong> ${profile.name || "-"}</p>
        <p><strong>会社名:</strong> ${profile.company || "-"}</p>
        <p><strong>メール:</strong> ${profile.email || user.email}</p>
      `;
      document.getElementById("logout").addEventListener("click", async () => {
        await gemihub.auth.logout("partner");
        location.href = "/login/partner";
      });
    })();
  </script>
</body>
</html>
